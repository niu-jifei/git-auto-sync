# Git Auto Sync - 仓库配置文件
# ===========================================
# 每行填一个 Git 仓库的路径。
# 以 # 开头的行为注释，空行会被忽略。
#
# macOS / Linux 示例：
#   ~/projects/my-app
#   ~/work/backend-service
#
# Windows 示例：
#   ~/projects/my-app
#   C:\Users\yourname\work\backend-service
#
# ~/ 会自动展开为用户主目录（macOS/Linux 和 Windows 均支持）
#

# === 在下方添加你的仓库路径 ===

# ~/projects/project-a
# ~/projects/project-b
